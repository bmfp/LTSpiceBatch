name: Build and Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Exécution chaque dimanche à minuit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get latest FFmpeg release
        id: ffmpeg
        run: |
          FFmpeg_RELEASE_URL="https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest"
          FFmpeg_ASSET_URL=$(curl -sL $FFmpeg_RELEASE_URL | jq -r '.assets[] | select(.name | contains("win64-lgpl-8.1.zip")) | .browser_download_url')
          echo "ffmpeg_asset_url=$FFmpeg_ASSET_URL" >> $GITHUB_ENV
          echo "ffmpeg_version=$(curl -sL $FFmpeg_RELEASE_URL | jq -r '.tag_name')" >> $GITHUB_ENV

      - name: Get latest uv release
        id: uv
        run: |
          UV_RELEASE_URL="https://api.github.com/repos/astral-sh/uv/releases/latest"
          UV_ASSET_URL=$(curl -sL $UV_RELEASE_URL | jq -r '.assets[] | select(.name | test("x86_64-pc-windows-msvc.zip$")) | .browser_download_url')
          echo "uv_asset_url=$UV_ASSET_URL" >> $GITHUB_ENV
          echo "uv_version=$(curl -sL $UV_RELEASE_URL | jq -r '.tag_name')" >> $GITHUB_ENV

      - name: Download and extract FFmpeg
        run: |
          curl -L -o ffmpeg.zip ${{ env.ffmpeg_asset_url }}
          mkdir -p ffmpeg_extracted
          unzip ffmpeg.zip -d ffmpeg_extracted

      - name: Download and extract uv
        run: |
          curl -L -o uv.zip ${{ env.uv_asset_url }}
          mkdir -p uv_extracted
          tunzip uv.zip -d uv_extracted

      - name: Create combined release structure
        run: |
          mkdir -p release
          # Copier les binaires
          cp -r ffmpeg_extracted/bin/ffmpeg.exe release/
          cp -r uv_extracted/uv.exe release/
          # Copier le code source du dépôt
          cp -r ./* release/

      - name: Create combined archive
        run: |
          zip release.zip .

      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.ffmpeg_version }}-${{ env.uv_version }}
          release_name: Release ${{ env.ffmpeg_version }}-${{ env.uv_version }}
          body: |
            Release containing:
            - FFmpeg version: ${{ env.ffmpeg_version }}
            - uv version: ${{ env.uv_version }}
            
            Binaries included:
            - ffmpeg.exe
            - uv.exe
            
            Source code: Included in the archive
          draft: true
          prerelease: true

      - name: Upload combined archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release.zip
          asset_name: release-${{ env.ffmpeg_version }}-${{ env.uv_version }}.zip
          asset_content_type: application/zip

      - name: Cleanup
        run: |
          rm -rf ffmpeg_extracted uv_extracted release release.zip